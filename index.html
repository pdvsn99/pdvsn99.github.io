<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pdvsn</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%23F1668B'/></svg>">

  <style>
    :root {
      --pink: #F1668B;
      --white: #fff;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.65);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background-color: var(--pink);
      color: var(--white);
      font-family: "Arial Narrow", Arial, sans-serif;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: grayscale;
      cursor: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="8" height="8"><rect width="8" height="8" fill="%23FFFFFF"/></svg>') 4 4, auto;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 3rem;
      box-sizing: border-box;
    }

    h1 {
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      letter-spacing: 2px;
      margin: 0 0 0.6rem;
      filter: blur(1.4px);
      animation: fadeIn 0.9s ease-in-out;
    }

    .directory {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      animation: fadeIn 1.35s ease-in-out;
    }

    .card--large {
      grid-column: span 2;
    }

    .card {
      border: 1px solid var(--panel-border);
      background: var(--panel);
      padding: 0.9rem;
      text-decoration: none;
      color: var(--white);
      transition: transform 0.18s ease, background 0.18s ease;
      filter: blur(0.9px);
    }

    .card:nth-child(odd) {
      transform: rotate(-0.7deg);
    }

    .card:nth-child(even) {
      transform: rotate(0.6deg);
    }

    .card:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.15);
      filter: blur(0);
    }

    .card h2 {
      margin: 0;
      font-size: 1.15rem;
      letter-spacing: 0.5px;
      text-transform: lowercase;
    }

    .info-box {
      margin-top: 0.55rem;
      border: 1px dashed rgba(255, 255, 255, 0.7);
      padding: 0.55rem;
      font-size: 0.95rem;
      line-height: 1.25;
      opacity: 0.95;
    }

    .footer {
      margin-top: 1.8rem;
      font-size: 0.85rem;
      opacity: 0.72;
      filter: blur(0.8px);
      animation: fadeIn 1.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 640px) {
      .card--large {
        grid-column: span 1;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>pdvsn</h1>

    <section class="directory" aria-label="site directory">
      <a class="card" href="https://films.pdvsn.com" target="_blank" rel="noopener noreferrer">
        <h2>films</h2>
        <div class="info-box">Short films and visual pieces with direct watch links.</div>
      </a>

      <a class="card card--large" href="https://visits.pdvsn.com" target="_blank" rel="noopener noreferrer">
        <h2>visits</h2>
        <div class="info-box">Visit scheduling, info, and updates in one place.</div>
      </a>

      <a class="card" href="https://carbclub.pdvsn.com" target="_blank" rel="noopener noreferrer">
        <h2>carb club</h2>
        <div class="info-box">External microsite for carb club updates and details.</div>
      </a>

      <a class="card" href="https://instagram.com/pdvsn99" target="_blank" rel="noopener noreferrer">
        <h2>instagram</h2>
        <div class="info-box">Reach out or follow along via Instagram.</div>
      </a>
    </section>

    <div class="footer">pdvsn.com</div>
  </main>
</body>
</html>
